services:
  postgres:
    image: postgres:16
    container_name: finpulse_postgres
    restart: always
    environment:
      POSTGRES_USER: finpulse_user
      POSTGRES_PASSWORD: finpulse_password
      POSTGRES_DB: finpulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpulse_user -d finpulse"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finpulse_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: finpulse_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finpulse.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finpulse_network

  minio:
    image: minio/minio
    container_name: finpulse_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finpulse_network

  minio-init:
    image: minio/mc
    container_name: finpulse_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set finpulse http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing finpulse/raw;
      mc mb --ignore-existing finpulse/processed;
      mc mb --ignore-existing finpulse/curated;
      mc mb --ignore-existing finpulse/reports;
      mc mb --ignore-existing finpulse/mlflow;
      exit 0;
      "
    networks:
      - finpulse_network

  mlflow:
    build:
      context: ./docker/mlflow
    container_name: finpulse_mlflow
    restart: always
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_SERVER_ALLOWED_HOSTS: "localhost:*,127.0.0.1:*,mlflow:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://finpulse_user:finpulse_password@postgres:5432/mlflow
      --artifacts-destination s3://mlflow
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - finpulse_network

  jupyter:
    build:
      context: ./docker/jupyter
    container_name: finpulse_jupyter
    restart: always
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    networks:
      - finpulse_network
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: finpulse_api
    restart: unless-stopped
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      MODEL_NAME: finpulse-churn-catboost
      MODEL_ALIAS: champion
      DATABASE_URL: postgresql+psycopg2://finpulse_user:finpulse_password@postgres:5432/finpulse
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finpulse_network
  api-tests:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.test
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - test
    networks:
      - finpulse_network
volumes:
  postgres_data:
  pgadmin_data:
  minio_data:

networks:
  finpulse_network:
    driver: bridge